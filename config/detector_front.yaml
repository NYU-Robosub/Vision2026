front_detector:
  ros__parameters:
    enabled: false
    image_topic: /front/zed_node/rgb/color/rect/image
    depth_topic: /front/zed_node/depth/depth_registered
    camera_info_topic: /front/zed_node/rgb/color/rect/camera_info
    detections_topic: /perception/front/detections
    model_path: models/tensorrt/front_detector.engine
    confidence_threshold: 0.5
    nms_iou_threshold: 0.45
    class_allowlist: []
    enable_depth_estimation: true
    publish_debug_image: false
    debug_image_topic: /perception/front/debug_image
