/**:
  ros__parameters:
    general:
      # This camera name becomes the front camera namespace in the wrapper.
      camera_name: front
      camera_model: zed2i
      serial_number: 36534008
      grab_resolution: HD720
      grab_frame_rate: 30
      pub_resolution: CUSTOM
      pub_downscale_factor: 2.0

    video:
      publish_rgb: true
      publish_left_right: false
      publish_raw: false
      publish_gray: false
      publish_stereo: false

    depth:
      depth_mode: NEURAL_LIGHT
      depth_stabilization: -1
      depth_confidence: 95
      publish_depth_map: true
      publish_depth_info: false
      publish_point_cloud: false

    pos_tracking:
      pos_tracking_enabled: true
      pos_tracking_mode: AUTO
      imu_fusion: true
      # The localization node republishes the robot TF chain.
      publish_tf: false
      publish_map_tf: false
      map_frame: map
      odometry_frame: odom
      area_memory: false
      enable_localization_only: false
      publish_odom_pose: true
      publish_cam_path: false

    sensors:
      publish_imu_tf: true
      publish_imu: true
      publish_imu_raw: false
      publish_cam_imu_transf: false
      publish_mag: false
      publish_baro: false
      publish_temp: false

    object_detection:
      od_enabled: false
